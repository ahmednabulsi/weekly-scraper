name: Weekly Scraper

on:
  schedule:
    # Runs at 00:00 UTC Friday (5:00 PM Thursday PDT / UTC-7)
    - cron: '0 0 * * 5'
    # Runs at 05:00 UTC Friday (10:00 PM Thursday PDT / UTC-7)
    - cron: '0 5 * * 5'
    # Runs at 09:00 UTC Friday (2:00 AM Friday PDT / UTC-7)
    - cron: '0 9 * * 5'
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  build:
    runs-on: ubuntu-latest
    
    # This block is crucial for allowing the bot to save your data.json
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Upgraded for 2026 compatibility

      - name: Install dependencies
        run: |
          pip install requests groq google-generativeai beautifulsoup4 lxml Pillow

      - name: Run all scrapers
        env:
          # This pulls the key you saved in GitHub Settings > Secrets
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python run_all.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          # The "|| exit 0" prevents the workflow from failing if there are no data changes
          git commit -m "Automated data update: $(date)" || exit 0
          git push
