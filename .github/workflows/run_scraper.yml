name: Weekly Scraper

on:
  schedule:
    # Runs at 04:00 UTC every Friday (8:00 PM Thursday PDT)
    - cron: '0 4 * * 5'
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  build:
    runs-on: ubuntu-latest
    
    # This block is crucial for allowing the bot to save your data.json
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Upgraded for 2026 compatibility

      - name: Install dependencies
        run: |
          pip install requests google-genai # Note the new library name

      - name: Run scraper
        env:
          # This pulls the key you saved in GitHub Settings > Secrets
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scraper.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          # The "|| exit 0" prevents the workflow from failing if there are no data changes
          git commit -m "Automated data update: $(date)" || exit 0
          git push
