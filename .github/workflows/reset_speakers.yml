name: Reset Speakers

on:
  schedule:
    # Runs at 05:00 UTC Saturday (10:00 PM Friday PDT / UTC-7)
    - cron: '0 5 * * 6'
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  reset:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Reset speakers
        run: python reset_speakers.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "Reset speakers: $(date)" || exit 0
          git push
