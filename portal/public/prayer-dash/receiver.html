<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prayer Dashboard Receiver</title>
    <!-- Google Cast Receiver SDK -->
    <script type="text/javascript"
        src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;500;700&display=swap');

        body {
            font-family: 'Roboto', sans-serif;
            background-color: #000;
            color: #fff;
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #clock-container {
            text-align: center;
            margin-bottom: 40px;
        }

        #current-time {
            font-size: 110pt;
            font-weight: 700;
            margin: 0;
        }

        #current-date {
            font-size: 32pt;
            color: #aaa;
            margin-top: -10px;
        }

        .prayer-grid {
            display: flex;
            justify-content: space-around;
            width: 90%;
            max-width: 1000px;
        }

        .prayer-card {
            text-align: center;
            padding: 20px;
            border-radius: 15px;
            background: #1a1a1a;
            min-width: 120px;
            transition: all 0.5s ease;
        }

        .prayer-card.next {
            background: #cd7f32;
            /* Bronze/Gold accent */
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(205, 127, 50, 0.5);
        }

        .prayer-name {
            font-size: 22pt;
            font-weight: 700;
            text-transform: uppercase;
            color: #fff;
            margin-bottom: 10px;
        }

        .prayer-card.next .prayer-name {
            color: #fff;
        }

        .prayer-time {
            font-size: 32pt;
            color: #ddd;
        }

        .prayer-card.next .prayer-time {
            color: #fff;
        }

        .iqamah-time {
            font-size: 32pt;
            font-weight: 500;
            color: #fff;
            margin-top: 12px;
        }

        .prayer-card.next .iqamah-time {
            color: #fff;
        }

        #status {
            position: absolute;
            bottom: 20px;
            font-size: 10pt;
            color: #444;
        }

        /* Light Mode Styles */
        body.light-mode {
            background-color: #fff;
            color: #000;
        }

        body.light-mode #current-date {
            color: #666;
        }

        body.light-mode .prayer-card {
            background: #f5f5f5;
            border: 1px solid #e0e0e0;
        }

        body.light-mode .prayer-name {
            color: #000;
        }

        body.light-mode .prayer-time {
            color: #444;
        }

        body.light-mode .iqamah-time {
            color: #000;
        }

        body.light-mode .prayer-card.next {
            background: #cd7f32;
            border-color: #cd7f32;
            box-shadow: 0 0 20px rgba(205, 127, 50, 0.3);
        }

        body.light-mode .prayer-card.next .prayer-name,
        body.light-mode .prayer-card.next .prayer-time,
        body.light-mode .prayer-card.next .iqamah-time {
            color: #fff;
        }
    </style>
</head>

<body>

    <div id="clock-container">
        <div id="current-time">00:00</div>
        <div id="current-date">Loading...</div>
    </div>

    <div class="prayer-grid" id="prayer-grid">
        <div class="prayer-card" id="fajr">
            <div class="prayer-name">Fajr</div>
            <div class="prayer-time">--:--</div>
            <div class="iqamah-time">--:--</div>
        </div>
        <div class="prayer-card" id="dhuhr">
            <div class="prayer-name">Dhuhr</div>
            <div class="prayer-time">--:--</div>
            <div class="iqamah-time">--:--</div>
        </div>
        <div class="prayer-card" id="asr">
            <div class="prayer-name">Asr</div>
            <div class="prayer-time">--:--</div>
            <div class="iqamah-time">--:--</div>
        </div>
        <div class="prayer-card" id="maghrib">
            <div class="prayer-name">Maghrib</div>
            <div class="prayer-time">--:--</div>
            <div class="iqamah-time">--:--</div>
        </div>
        <div class="prayer-card" id="isha">
            <div class="prayer-name">Isha</div>
            <div class="prayer-time">--:--</div>
            <div class="iqamah-time">--:--</div>
        </div>
    </div>

    <div id="status">Waiting for data...</div>

    <audio id="alert-sound" src="https://media.assabile.com/assabile/adhan_3435370/cd17c7200df5.mp3"
        preload="auto"></audio>

    <script>
        const context = cast.framework.CastReceiverContext.getInstance();
        const options = new cast.framework.CastReceiverOptions();

        // Keep the screen awake indefinitely
        options.disableIdleTimeout = true;

        let prayerData = null;
        let JSON_URL = 'https://raw.githubusercontent.com/ahmednabulsi/weekly-scraper/refs/heads/main/alnoor.json';
        const BASE_URL = 'https://raw.githubusercontent.com/ahmednabulsi/weekly-scraper/refs/heads/main/';

        // 1. Initialization
        function init() {
            updateClock();
            fetchPrayerData();
            setInterval(updateClock, 1000);
            setInterval(fetchPrayerData, 3600000); // Re-fetch every hour to stay in sync
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('current-time').innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            document.getElementById('current-date').innerText = now.toLocaleDateString([], { weekday: 'long', month: 'long', day: 'numeric' });

            if (prayerData) {
                checkAlerts(now);
                highlightNextPrayer(now);
                updateTheme(now);
            }
        }

        function updateTheme(now) {
            if (!prayerData || !prayerData.sunrise || !prayerData.maghrib_azaan) return;
            
            const sunriseTime = getPrayerDateTime(prayerData.sunrise, true);
            const sunsetTime = getPrayerDateTime(prayerData.maghrib_azaan, false);

            if (now >= sunriseTime && now < sunsetTime) {
                document.body.classList.add('light-mode');
            } else {
                document.body.classList.remove('light-mode');
            }
        }

        async function fetchPrayerData() {
            try {
                const response = await fetch(JSON_URL);
                const data = await response.json();
                const now = new Date();
                const monthNames = ["January", "February", "March", "April", "May", "June",
                    "July", "August", "September", "October", "November", "December"];

                const currentMonth = monthNames[now.getMonth()];
                const currentDay = now.getDate().toString();

                prayerData = data[currentMonth][currentDay];
                updateUI(prayerData);
                document.getElementById('status').innerText = "Data Updated: " + new Date().toLocaleTimeString();
            } catch (e) {
                document.getElementById('status').innerText = "Fetch Error: " + e.message;
            }
        }

        function updateUI(data) {
            document.querySelector('#fajr .prayer-time').innerText = data.fajr_azaan;
            document.querySelector('#fajr .iqamah-time').innerText = data.fajr_iqamah;

            document.querySelector('#dhuhr .prayer-time').innerText = data.dhuhr_azaan;
            document.querySelector('#dhuhr .iqamah-time').innerText = data.dhuhr_iqamah;

            document.querySelector('#asr .prayer-time').innerText = data.asr_azaan;
            document.querySelector('#asr .iqamah-time').innerText = data.asr_iqamah;

            document.querySelector('#maghrib .prayer-time').innerText = data.maghrib_azaan;
            document.querySelector('#maghrib .iqamah-time').innerText = data.maghrib_iqamah;

            document.querySelector('#isha .prayer-time').innerText = data.isha_azaan;
            document.querySelector('#isha .iqamah-time').innerText = data.isha_iqamah;
        }

        function getPrayerDateTime(timeStr, isFajr) {
            const [hours, minutes] = timeStr.split(':').map(Number);
            const d = new Date();
            let h = hours;
            // PM logic: if not Fajr and hour < 12, assume PM
            if (!isFajr && h < 12) h += 12;
            d.setHours(h, minutes, 0, 0);
            return d;
        }

        function checkAlerts(now) {
            const keys = ['fajr_azaan', 'dhuhr_azaan', 'asr_azaan', 'maghrib_azaan', 'isha_azaan'];
            keys.forEach(k => {
                const pTime = getPrayerDateTime(prayerData[k], k === 'fajr_azaan');
                const diff = pTime.getTime() - now.getTime();

                // Trigger exactly at prayer time
                // We check if it's within a 1-second window to prevent multiple triggers
                if (diff > -1000 && diff < 1000) {
                    document.getElementById('alert-sound').play();
                }
            });
        }

        function highlightNextPrayer(now) {
            const keys = ['fajr_azaan', 'dhuhr_azaan', 'asr_azaan', 'maghrib_azaan', 'isha_azaan'];
            let nextKey = null;

            for (let k of keys) {
                const pTime = getPrayerDateTime(prayerData[k], k === 'fajr_azaan');
                if (pTime > now) {
                    nextKey = k.split('_')[0];
                    break;
                }
            }

            // Reset highlights
            document.querySelectorAll('.prayer-card').forEach(c => c.classList.remove('next'));
            if (nextKey) {
                document.getElementById(nextKey).classList.add('next');
            } else {
                // If all prayers passed, next is tomorrow's Fajr
                document.getElementById('fajr').classList.add('next');
            }
        }

        // Listen for mosque changes from sender (register BEFORE start)
        context.addCustomMessageListener('urn:x-cast:prayer-dash', (event) => {
            let data = event.data;
            // If the message is a string (best practice for compatibility), parse it
            if (typeof data === 'string') {
                try {
                    data = JSON.parse(data);
                } catch (e) {
                    console.error('Error parsing message data', e);
                }
            }

            if (data && data.mosqueFile) {
                JSON_URL = BASE_URL + encodeURIComponent(data.mosqueFile);
                console.log('Switching to mosque: ' + JSON_URL);
                fetchPrayerData();
            }
        });

        context.start(options);
        init();
    </script>
</body>

</html>
